# Mensajes y acciones de feedback en español para ProgressEngine.
config-version: 2

number-format:
  grouping-separator: "."
  decimal-separator: ","
  compact-decimals: 1
  compact-space: false
  loading-text: "Cargando..."
  compact-suffixes:
    thousand: "K"
    million: "M"
    billion: "B"
    trillion: "T"
    quadrillion: "Qa"
    quintillion: "Qi"

currency:
  display-name: "Points"
  symbol: ""
  format: "%price% %display-name%"
  price-format: "COMPACT"

messages:
  points-loading: "<yellow>Tus points todavía están cargando.</yellow>"
  command-no-permission: "<red>No tenés permiso para usar esto.</red>"
  command-player-only: "<red>Solo jugadores pueden usar este comando.</red>"
  command-console-only: "<red>Solo la consola puede usar este comando.</red>"
  command-player-or-console-only: "<red>Solo jugadores o consola pueden usar este comando.</red>"
  command-disabled: "<red>El comando <command> está deshabilitado.</red>"
  invalid-amount: "<red>Cantidad inválida: <input>.</red>"
  invalid-page: "<red>Página inválida: <input>.</red>"
  invalid-reason: "<red>Razón inválida: <input>.</red>"
  unknown-target: "<red>Jugador desconocido: <target>.</red>"
  target-self: "<red>No podés enviarte points a vos mismo.</red>"
  balance-self: "<green>Balance: <balance>.</green>"
  balance-other: "<green>Balance de <target>: <balance>.</green>"
  pay-range: "<red>La cantidad debe estar entre <minimum> y <maximum>.</red>"
  pay-confirm-required: "<yellow>Confirmá el envío de <amount> a <target> con <gold>/points pay confirm <token></gold>.</yellow>"
  pay-retry-available: "<yellow>El resultado no fue confirmado. Reintentá la misma intención con <gold>/points pay retry <token></gold>.</yellow>"
  pay-token-invalid: "<red>Token de pago inválido: <token>.</red>"
  pay-token-expired: "<red>El token de pago <token> venció.</red>"
  pay-token-stale: "<red>Tu balance cambió desde que generaste la confirmación. Generá el pago nuevamente.</red>"
  pay-success-sender: "<green>Enviaste <amount> a <target>. Balance: <balance>.</green>"
  pay-success-receiver: "<green>Recibiste <amount> de <sender>. Balance: <balance>.</green>"
  pay-insufficient-funds: "<red>Necesitás <amount>, pero tu balance es <balance>.</red>"
  pay-balance-limit: "<red><target> no puede recibir <amount> porque superaría su límite.</red>"
  pay-cooldown: "<red>Esperá <seconds>s antes de enviar otro pago.</red>"
  history-empty: "<yellow>No se encontraron movimientos de points.</yellow>"
  history-header: "<gold>Historial de points <gray>(página <page>)</gray></gold>"
  history-entry: "<gray><date> <white><amount></white> | <type> | <reason> | balance <balance></gray>"
  history-session-expired: "<red>La sesión de historial venció. Abrí el historial nuevamente.</red>"
  history-next-page: "<yellow>Página siguiente: <gold>/points history <page></gold></yellow>"
  history-previous-page: "<yellow>Página anterior: <gold>/points history <page></gold></yellow>"
  admin-add-success: "<green>Agregaste <amount> a <target>. Balance: <balance>.</green>"
  admin-remove-success: "<green>Quitaste <amount> a <target>. Balance: <balance>.</green>"
  admin-set-success: "<green>Balance de <target> establecido en <balance>.</green>"
  admin-reset-success: "<green>Balance de <target> reiniciado. Balance: <balance>.</green>"
  admin-retry-available: "<yellow>El resultado no fue confirmado. Reintentá la misma intención con <gold>/points admin retry <token></gold>.</yellow>"
  admin-reload-success: "<green>ProgressEngine recargado. Revisión: <revision>. Aplicado: <applied>.</green>"
  admin-reload-restart-required: "<yellow>Requiere reinicio para aplicar: <changes>.</yellow>"
  admin-reload-failure: "<red>No se pudo recargar ProgressEngine: <problems>.</red>"
  admin-status-header: "<gold>Estado de ProgressEngine: <state></gold>"
  admin-status-line: "<gray><label>: <white><value></white></gray>"
  infrastructure-unavailable: "<red>ProgressEngine no está disponible temporalmente.</red>"

feedback:
  award-received:
    - type: action_bar
      message: "<green>+<amount> <gray>| <white><balance> total</white></gray></green>"
    - type: sound
      sound: "minecraft:entity.experience_orb.pickup"
      source: "master"
      volume: 0.8
      pitch: 1.2
  transfer-received:
    - type: chat
      message: "<green>Recibiste <amount> de <sender>. Balance: <balance>.</green>"
    - type: sound
      sound: "minecraft:block.note_block.pling"
      source: "master"
      volume: 0.7
      pitch: 1.1
